---
name: Test

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '**.conf'
      - '**.conf.example'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
      - '**.conf'
      - '**.conf.example'
      - '.github/workflows/test.yml'

jobs:
  test-llama-cpp:
    name: Test llama.cpp Scripts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify bash syntax (all scripts)
        run: |
          for script in *.sh lib/*.sh; do
            echo "Checking syntax: $script"
            bash -n "$script"
          done

      - name: Test help commands
        run: |
          ./setup.sh --help || true
          ./setup-macos.sh --help || true
          ./start-server.sh --help || true
          ./download-model.sh --help || true
          ./sync-opencode.sh --help
          ./uninstall.sh --help || true

      - name: Validate llama.cpp models.conf format
        run: |
          echo "Validating models.conf (llama.cpp format)..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^ALIAS: ]] && continue
            [[ "$line" =~ ^IGNORE_ ]] && continue
            # Format: category|model_id|huggingface_repo|gguf_filename|size|description
            pattern='^[a-z]+\|[a-z0-9._-]+\|[A-Za-z0-9._/-]+\|[A-Za-z0-9._-]+\.gguf\|[0-9]+(\.[0-9]+)?[GMK]?B\|.+'
            if ! [[ "$line" =~ $pattern ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < models.conf
          echo "models.conf: OK"

      - name: Validate llama.cpp models-metadata.conf.example format
        run: |
          echo "Validating models-metadata.conf.example..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            # Format: model_id|name|context|output
            if ! [[ "$line" =~ ^[a-z0-9._-]+\|.+\|[0-9]+\|[0-9]+$ ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < models-metadata.conf.example
          echo "models-metadata.conf.example: OK"

      - name: Validate .env.example format
        run: |
          echo "Validating .env.example..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            # Format: KEY=value or KEY= (empty value allowed)
            if ! [[ "$line" =~ ^[A-Z_][A-Z0-9_]*= ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < .env.example
          echo ".env.example: OK"

  test-ollama:
    name: Test Ollama Scripts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bash 4+ (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash
          echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Verify bash syntax
        run: |
          for script in ollama/*.sh; do
            echo "Checking syntax: $script"
            bash -n "$script"
          done

      - name: Test help commands
        run: |
          ./ollama/setup.sh --help || true
          ./ollama/setup-macos.sh --help || true
          ./ollama/sync-opencode.sh --help
          ./ollama/uninstall.sh --help || true

      - name: Validate Ollama models.conf format
        run: |
          echo "Validating ollama/models.conf..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^IGNORE_ ]] && continue
            # Format: category|model:tag|size|description
            if ! [[ "$line" =~ ^[a-z]+\|[a-z0-9._-]+:[a-z0-9._-]+\|[0-9]+(\.[0-9]+)?[GMK]?B\|.+ ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < ollama/models.conf
          echo "ollama/models.conf: OK"

      - name: Validate Ollama models-metadata.conf.example format
        run: |
          echo "Validating ollama/models-metadata.conf.example..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            # Format: model:tag|name|context|output
            if ! [[ "$line" =~ ^[a-z0-9._-]+:[a-z0-9._-]+\|.+\|[0-9]+\|[0-9]+$ ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < ollama/models-metadata.conf.example
          echo "ollama/models-metadata.conf.example: OK"

      - name: Validate Ollama .env.example format
        run: |
          echo "Validating ollama/.env.example..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            # Format: KEY=value or KEY= (empty value allowed)
            if ! [[ "$line" =~ ^[A-Z_][A-Z0-9_]*= ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < ollama/.env.example
          echo "ollama/.env.example: OK"
