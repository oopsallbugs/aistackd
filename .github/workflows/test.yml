---
name: Test

on:
  push:
    branches: [main]
    paths:
      - '**.sh'
      - '**.conf'
      - '**.conf.example'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
      - '**.conf'
      - '**.conf.example'
      - '.github/workflows/test.yml'

jobs:
  test-llama-cpp:
    name: Test llama.cpp Scripts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify bash syntax (all scripts)
        run: |
          for script in *.sh lib/*.sh; do
            echo "Checking syntax: $script"
            bash -n "$script"
          done

      - name: Test help commands
        run: |
          ./setup.sh --help || true
          ./setup-macos.sh --help || true
          ./start-server.sh --help || true
          ./download-model.sh --help || true
          ./sync-opencode.sh --help
          ./uninstall.sh --help || true

      - name: Validate llama.cpp models.conf format
        run: |
          echo "Validating models.conf (llama.cpp format)..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^ALIAS: ]] && continue
            [[ "$line" =~ ^IGNORE_ ]] && continue
            [[ "$line" =~ ^WHITELIST: ]] && continue
            # Format: category|model_id|huggingface_repo|gguf_filename|size|description[|context][|output]
            # 6 required fields, 2 optional (context_limit, output_limit)
            pattern='^[a-z]+\|[a-z0-9._-]+\|[A-Za-z0-9._/-]+\|[A-Za-z0-9._-]+\.gguf\|[0-9]+(\.[0-9]+)?[GMK]?B\|[^|]+(\|[0-9]*)?(\|[0-9]*)?$'
            if ! [[ "$line" =~ $pattern ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < models.conf
          echo "models.conf: OK"

      - name: Validate .env.example format
        run: |
          echo "Validating .env.example..."
          while IFS= read -r line; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "$line" ]] && continue
            # Format: KEY=value or KEY= (empty value allowed)
            if ! [[ "$line" =~ ^[A-Z_][A-Z0-9_]*= ]]; then
              echo "Invalid line: $line"
              exit 1
            fi
          done < .env.example
          echo ".env.example: OK"
