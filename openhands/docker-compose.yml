---
# OpenHands Docker Compose Configuration
# Alternative to start-openhands.sh for docker-compose users
#
# Usage:
#   docker-compose -f openhands/docker-compose.yml up -d
#   docker-compose -f openhands/docker-compose.yml logs -f
#   docker-compose -f openhands/docker-compose.yml down
#
# Or use the start-openhands.sh script for a simpler experience.

services:
  openhands:
    container_name: openhands-app
    image: docker.all-hands.dev/all-hands-ai/openhands:${OPENHANDS_VERSION:-1.3.0}
    ports:
      - "${OPENHANDS_PORT:-3000}:3000"
    volumes:
      # Docker socket for sandbox containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Workspace mount - change this to your projects directory
      - ${OPENHANDS_WORKSPACE:-./workspace}:/opt/workspace_base
    environment:
      # Sandbox runtime image (should match openhands version)
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=docker.all-hands.dev/all-hands-ai/runtime:${OPENHANDS_VERSION:-1.3.0}
      # LLM Configuration
      # For local llama.cpp server:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:8080/v1}
      # For remote LLM server, set REMOTE_LLM_URL in .env:
      # - LLM_BASE_URL=${REMOTE_LLM_URL}/v1
      # Model name (use your downloaded model ID)
      - LLM_MODEL=openai/${LLM_MODEL:-llama.cpp}
      # API key (not needed for llama.cpp)
      - LLM_API_KEY=not-needed
    extra_hosts:
      # Allows container to reach host's localhost
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
