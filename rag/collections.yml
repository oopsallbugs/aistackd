---
# RAG Collection Definitions
#
# Collections keep different document types separate.
# When searching, specify which collection to query.
#
# To add a custom collection, add an entry like:
#   work:
#     description: "Work-related projects"
#     file_types: [".py", ".md", ".txt"]
#
# Then index files to it:
#   ./rag-index.sh --collection work ~/work/projects/

collections:
  coding:
    description: "Code and technical documentation"
    file_types:
      - ".py"
      - ".js"
      - ".ts"
      - ".tsx"
      - ".jsx"
      - ".sh"
      - ".md"
      - ".rst"
      - ".txt"
      - ".go"
      - ".rs"
      - ".c"
      - ".cpp"
      - ".h"
      - ".hpp"
      - ".java"
      - ".rb"
      - ".php"
      - ".yaml"
      - ".yml"
      - ".json"
      - ".toml"

  notes:
    description: "General notes and documents"
    file_types:
      - ".md"
      - ".txt"
      - ".org"
