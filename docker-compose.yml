# Docker Compose for RAG services
# SearXNG metasearch engine for web search

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8888:8080"
    volumes:
      - ./rag/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge
