# Opencode Tools Configuration
version: "1.0"

# By default, opencode will include all tools from /llama-cpp-setup/tools in the global config.
# this file selects which tools to exclude from the global opencode config in ~/.config/opencode/tools
# To exclude a tool, add its name to the list below. For example, to exclude "/tools/websearch.ts", add it like this:

# exclude:
  # - websearch.ts
  
# Optional: Override to ONLY include specific tools
# include:
#   - websearch.ts
