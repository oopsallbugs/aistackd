# =============================================================================
# llama.cpp GGUF Model Configuration
# =============================================================================
#
# This file defines which GGUF models can be downloaded and used with llama.cpp.
# Models listed here appear in:
#   - ./download-model.sh --list
#   - ./setup.sh model selection menu
#   - ./sync-opencode.sh (if downloaded)
#
# FORMAT:
#   category|model_id|huggingface_repo|gguf_filename|size|description|context_limit|output_limit
#
# The last two fields (context_limit, output_limit) are OPTIONAL.
# If omitted, defaults are used based on category:
#   - coding:  65536 context, 16384 output
#   - vision:  16384 context, 4096 output
#   - default: 32768 context, 8192 output
#
# IMPORTANT: Do NOT use commas in descriptions (breaks the selection menu)
#
# NAMING CONVENTION:
#   Model IDs include quantization level: <model>-<size>-<quant>
#   Examples: qwen3-8b-q4km, deepseek-r1-32b-q3km
#
# CATEGORIES (affects default context limits in OpenCode):
#   small         - Tiny models for testing
#   autocomplete  - Small fast models for IDE code completion
#   general       - All-purpose chat and coding models
#   reasoning     - Models that show their thinking process
#   coding        - Models optimized for code generation (gets higher context)
#   vision        - Multimodal models for image understanding (require mmproj)
#   uncategorized - Models added via --add (edit to recategorize)
#
# QUANTIZATION LEVELS (suffix in model_id):
#   q4km   - Q4_K_M - Good balance of quality and size (recommended)
#   q3km   - Q3_K_M - Smaller size, less VRAM needed
#   q5km   - Q5_K_M - Higher quality, larger size
#   q6k    - Q6_K   - Near full quality, much larger
#   q8     - Q8_0   - Highest quality quantization
#
# ADDING NEW MODELS:
#   ./download-model.sh --search <query>    # Find models on HuggingFace
#   ./download-model.sh --add <repo>        # Download + auto-add here
#   ./sync-opencode.sh               # Sync to OpenCode
#
# =============================================================================

# -----------------------------------------------------------------------------
# ALIASES - Short names for commonly used models
# These allow you to use shorter names like: ./start-server.sh qwen3
# Format: ALIAS:short_name=full_model_id
# -----------------------------------------------------------------------------
ALIAS:qwen30b=qwen3-30b-q4km
ALIAS:coder=glm-4-7-flash-mxfp4-moe
ALIAS:test=qwen2-0.5b-q4km
ALIAS:reasoning=deepseek-r1-32b-q4km
ALIAS:r1=deepseek-r1-32b-q4km
ALIAS:vision=qwen3vl-8b-q8

