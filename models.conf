# =============================================================================
# Ollama Model Configuration
# =============================================================================
# 
# This file defines which models appear in the setup scripts selection menu.
# 
# FORMAT:
#   category|model:tag|size|description
#
# IMPORTANT: Do NOT use commas in descriptions (breaks the selection menu)
#
# CATEGORIES:
#   autocomplete  - Small, fast models for IDE code completion
#   general       - All-purpose chat and coding models
#   reasoning     - Models that show their thinking process
#   coding        - Models optimized for code generation and agentic tasks
#   specialized   - Task-specific models (SQL, etc.)
#
# ADDING CUSTOM MODELS:
#   Just add a new line following the format above. For example:
#   coding|codellama:34b|19GB|Metas code-focused model
#
# FINDING MODELS:
#   Browse available models at: https://ollama.com/library
#
# NOTES:
#   - First model in each category is selected by default during setup
#   - Lines starting with # are ignored
#   - Sizes are approximate (actual size depends on quantization)
#   - Models are shown grouped by category during setup
#   - You can also pull models manually later:
#     docker exec ollama ollama pull <model:tag>
#
# =============================================================================

# -----------------------------------------------------------------------------
# IDE Autocomplete - Small, fast models for code completion
# -----------------------------------------------------------------------------
autocomplete|qwen2.5-coder:3b|2GB|Fast code completion for IDE

# -----------------------------------------------------------------------------
# General Purpose - Good all-rounders for chat and coding
# -----------------------------------------------------------------------------
general|qwen3:14b|9GB|Fast all-rounder with good quality
general|qwen3:8b|5GB|Very fast general purpose (speed priority)
general|qwen3:32b|20GB|Strong all-rounder for coding + chat
general|mistral-small:24b|14GB|Fast and capable with good balance
general|llama3.1:8b|4.7GB|Metas latest for limited VRAM

# -----------------------------------------------------------------------------
# Reasoning - Models that show their thinking process
# -----------------------------------------------------------------------------
reasoning|deepseek-r1:32b|20GB|Deep reasoning with chain of thought
reasoning|deepseek-r1:14b|9GB|Smaller reasoning model (faster)

# -----------------------------------------------------------------------------
# Coding Focus - Optimized for code generation and agentic tasks
# -----------------------------------------------------------------------------
coding|qwen3-coder:30b|18GB|Newest for agentic tasks and coding
coding|devstral:24b|14GB|Mistrals fast coding agent model
coding|codestral:22b|13GB|Mistrals code generation model
coding|deepseek-coder-v2:16b|10GB|Excellent coding with efficient size

# -----------------------------------------------------------------------------
# Specialized - Task-specific models
# -----------------------------------------------------------------------------
