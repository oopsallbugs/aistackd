small|qwen2-0.5b-q4km|Qwen/Qwen2-0.5B-Instruct-GGUF|qwen2-0_5b-instruct-q4_k_m.gguf|0.4GB|Fast inference test model
small|qwen3-4b-q4km|Qwen/Qwen3-4B-GGUF|Qwen3-4B-Q4_K_M.gguf|2.5GB|Small fast Qwen3 for testing

